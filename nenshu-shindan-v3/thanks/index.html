  <script>
  (function () {
    /* ===== 職種別 LINE友だち追加URL =====
       診断した資格区分に応じて最適なLINE公式アカウントへ振り分ける。
       - denki      : 電気工事士（第一種/第二種/電気主任/その他）
       - sekoukanri : 施工管理（1級/2級 電気施工管理）
       TODO[要確認]: 施工管理向けの専用LINE URLが分かれている場合は sekoukanri を差し替える。
                     現状リポジトリに存在する確定URLは lin.ee/PzFJp7H のみのため暫定で同一。 */
    var LINE_URLS = {
      denki: "https://lin.ee/PzFJp7H",
      sekoukanri: "https://lin.ee/PzFJp7H"
    };

    function getOcc() {
      var q = new URLSearchParams(location.search).get("occ");
      if (q === "denki" || q === "sekoukanri") return q;
      try {
        var s = sessionStorage.getItem("nv3_occ");
        if (s === "denki" || s === "sekoukanri") return s;
      } catch (e) {}
      return "denki";
    }

    var occ = getOcc();
    var url = LINE_URLS[occ] || LINE_URLS.denki;
    var line = document.getElementById("nv-line");
    if (line) line.setAttribute("href", url);

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: "thanks_page_view", lp_slug: "nenshu-shindan-v3", occupation: occ });

    if (line) {
      line.addEventListener("click", function () {
        window.dataLayer.push({ event: "line_friend_click", occupation: occ, line_cta_position: "thanks" });
      });
    }
  })();
