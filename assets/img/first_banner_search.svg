<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" font-family="'IPAGothic','Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eaf3ee"/>
    </linearGradient>
    <filter id="soft" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1f7a43" flood-opacity="0.18"/></filter>
  </defs>

  <rect width="1200" height="460" fill="url(#bg)"/>
  <!-- 左の緑アクセント -->
  <rect x="0" y="0" width="14" height="460" fill="#2e8b57"/>
  <!-- 右上のさりげない円（電気＝スパーク感） -->
  <circle cx="1090" cy="90" r="120" fill="#2e8b57" fill-opacity="0.06"/>
  <circle cx="1150" cy="360" r="90" fill="#2e8b57" fill-opacity="0.05"/>

  <!-- 専門ピル -->
  <g transform="translate(60,40)">
    <rect x="0" y="0" width="240" height="48" rx="24" fill="#2e8b57"/>
    <text x="120" y="32" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="800">電気業界 特化</text>
  </g>

  <!-- 見出し（濃色・高コントラスト） -->
  <text x="60" y="190" fill="#1f7a43" font-size="78" font-weight="900" letter-spacing="1">電気業界の求人を、</text>

  <!-- 検索バー風ビジュアル（検索サイトと一目で伝える） -->
  <g filter="url(#soft)">
    <rect x="60" y="226" width="1010" height="118" rx="59" fill="#ffffff" stroke="#2e8b57" stroke-width="4"/>
    <text x="108" y="304" fill="#2f3438" font-size="62" font-weight="800">あなたの条件で検索</text>
    <!-- 検索ボタン -->
    <circle cx="1006" cy="285" r="46" fill="#2e8b57"/>
    <g stroke="#ffffff" stroke-width="7" fill="none" stroke-linecap="round">
      <circle cx="999" cy="278" r="18"/><line x1="1013" y1="292" x2="1028" y2="307"/>
    </g>
  </g>

  <!-- サブ -->
  <text x="62" y="406" fill="#4a5560" font-size="36" font-weight="700">資格・年収・勤務地で絞り込み</text>

  <text x="1150" y="446" text-anchor="end" fill="#9aa6ac" font-size="18">※画像はイメージ</text>
</svg>
