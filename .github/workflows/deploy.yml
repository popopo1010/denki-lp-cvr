name: Deploy to Xserver

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-xserver
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      XSERVER_HOST: ${{ secrets.XSERVER_HOST }}
      XSERVER_PORT: ${{ secrets.XSERVER_PORT }}
      XSERVER_USER: ${{ secrets.XSERVER_USER }}
      XSERVER_DEPLOY_PATH: ${{ secrets.XSERVER_DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync booking slots JSON
        continue-on-error: true
        run: node scripts/sync-booking-slots.js

      - name: Sync LP canonical URLs
        run: node scripts/sync-lp-canonical-urls.mjs

      - name: Generate WP redirect fragment
        run: node scripts/generate-wp-redirects-fragment.mjs

      - name: Build thanks-v2 bundles
        run: |
          node scripts/build-thanks-v2-deferred.mjs
          node scripts/sync-thanks-v2-mirrors.mjs
          node scripts/generate-lp-thanks-redirects.mjs

      - name: Minify JS/CSS/HTML
        run: |
          ESBUILD="npx -y --package=esbuild@0.23.1 -- esbuild"
          for f in \
            assets/js/app.js \
            assets/js/app-v2.js \
            assets/js/wp-lp-redirect.js \
            assets/js/denki-suite.js \
            assets/js/thanks-v2-shared.js \
            assets/js/thanks-v2-deferred.js \
            assets/js/thanks-booking-bootstrap.js \
            assets/js/thanks-booking-custom.js \
            assets/js/thanks-booking-config.js \
            assets/js/thanks-booking-slots.js \
            assets/js/thanks-booking-loader.js \
            assets/js/thanks-testimonials.js \
            assets/js/thanks-gtm.js \
            assets/js/thanks-line-beacon.js \
            assets/js/thanks-job-preview.js \
            assets/js/thanks-page-context.js \
            assets/js/thanks-license-profile.js \
            assets/js/thanks-mobile-ux.js; do
            [ -f "$f" ] && $ESBUILD "$f" --minify --allow-overwrite --outfile="$f"
          done
          for f in \
            assets/css/cvr-boost.css \
            assets/css/cvr-boost-v2.css \
            assets/css/denki-suite.css \
            assets/css/thanks-calendar.css \
            assets/css/thanks-page.css; do
            [ -f "$f" ] && $ESBUILD "$f" --minify --allow-overwrite --outfile="$f"
          done
          HTML_MIN="npx -y --package=html-minifier-terser@7.2.0 -- html-minifier-terser"
          minify_html() {
            local f="$1"
            [ -f "$f" ] || return 0
            $HTML_MIN "$f" \
              --collapse-whitespace --remove-comments \
              --minify-css true --minify-js true \
              --remove-redundant-attributes --remove-script-type-attributes \
              --remove-style-link-type-attributes --use-short-doctype \
              --continue-on-parse-error \
              -o "$f.min"
            mv "$f.min" "$f"
          }
          for f in \
            thanks-v2/index.html \
            WPLP/thanks-v2/index.html \
            自前LP/thanks-v2/index.html \
            denkikouji-v2/index.html \
            WPLP/denkikouji-v2/index.html \
            自前LP/denkikouji-v2/index.html \
            sekoukanri-v2/index.html \
            sekoukanri-kentiku-v2/index.html \
            sekoukanri-doboku-v2/index.html \
            sekoukanri-denkisekou-v2/index.html \
            WPLP/sekoukanri-v2/index.html \
            WPLP/sekoukanri-kentiku-v2/index.html \
            WPLP/sekoukanri-doboku-v2/index.html \
            WPLP/sekoukanri-denkisekou-v2/index.html \
            自前LP/sekoukanri-v2/index.html \
            自前LP/sekoukanri-kentiku-v2/index.html \
            自前LP/sekoukanri-doboku-v2/index.html \
            自前LP/sekoukanri-denkisekou-v2/index.html \
            densen-bank-v3/index.html \
            denki-koji-bank-v3/index.html \
            index.html denkikouji/index.html sekoukanri/index.html \
            sekoukanri-kentiku/index.html sekoukanri-doboku/index.html sekoukanri-denkisekou/index.html; do
            minify_html "$f"
          done
          find thanks-v2/p WPLP/thanks-v2/p 自前LP/thanks-v2/p -name index.html 2>/dev/null | while read -r f; do
            minify_html "$f"
          done
          echo "--- minified sizes ---"
          ls -lh assets/js/app-v2.js assets/js/thanks-booking-bootstrap.js assets/css/thanks-page.css thanks-v2/index.html 2>/dev/null || true

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.XSERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_KEY:-}" ]; then
            echo "::error::Secret XSERVER_SSH_KEY is not set"
            exit 1
          fi
          for name in XSERVER_HOST XSERVER_PORT XSERVER_USER XSERVER_DEPLOY_PATH; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Secret or env ${name} is empty"
              exit 1
            fi
          done
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "$SSH_KEY" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"

      - name: Trust Xserver host key
        id: hostkey
        continue-on-error: true
        run: |
          set -euo pipefail
          install -m 700 -d "${HOME}/.ssh"
          touch "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 20 -p "$XSERVER_PORT" -H "$XSERVER_HOST" >> "${HOME}/.ssh/known_hosts" 2>/dev/null; then
              echo "ssh-keyscan succeeded on attempt ${attempt}"
              echo "ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "ssh-keyscan attempt ${attempt} failed, retrying in 5s..."
            sleep 5
          done
          echo "::warning::ssh-keyscan failed after retries; rsync will use StrictHostKeyChecking=accept-new"
          echo "ok=false" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Deploy via rsync
        env:
          HOSTKEY_OK: ${{ steps.hostkey.outputs.ok }}
        run: |
          set -euo pipefail
          if [ "${HOSTKEY_OK:-false}" = "true" ]; then
            SSH_CHECK="-o StrictHostKeyChecking=yes"
          else
            SSH_CHECK="-o StrictHostKeyChecking=accept-new"
          fi
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.cursor' \
            --exclude='実装依頼書.md' \
            --exclude='package.json' \
            --exclude='README.md' \
            --exclude='/thanks/' \
            --exclude='WPLP/thanks/' \
            --exclude='自前LP/thanks/' \
            --exclude='nenshu-shindan/thanks/' \
            -e "ssh -p ${XSERVER_PORT} -i ${HOME}/.ssh/id_ed25519 ${SSH_CHECK} -o ConnectTimeout=60 -o ServerAliveInterval=15" \
            ./ "${XSERVER_USER}@${XSERVER_HOST}:${XSERVER_DEPLOY_PATH}/"

      - name: Apply WP legacy redirects (.htaccess)
        run: bash scripts/apply-wp-root-redirects.sh

      - name: Verify deployment
        run: |
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/denkikouji-v2/" | head -3
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/thanks-v2/" | head -3
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/sekoukanri-kentiku-v2/" | head -3
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/assets/css/denki-suite.css" | head -3
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/assets/data/booking-slots.json" | head -3
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/assets/data/thanks-job-previews.json" | head -3
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/assets/img/testimonials/avatar-kt.svg" | head -3
          html=$(curl -s "https://denkilp.builders-job.com/denki-lp-cvr/thanks-v2/")
          echo "$html" | grep -q 'thanks-v2-deferred.js?v=5' || (echo "missing thanks-v2-deferred v=5" && exit 1)
          echo "$html" | grep -q 'GTM-KV525PZ' || (echo "missing GTM on thanks-v2" && exit 1)
          echo "$html" | grep -q 'requestIdleCallback(loadGTM' && (echo "thanks-v2 still lazy-loads GTM" && exit 1) || true
          deferred=$(curl -s "https://denkilp.builders-job.com/denki-lp-cvr/assets/js/thanks-v2-deferred.js")
          echo "$deferred" | grep -q 'lead_conversion' || (echo "thanks-v2-deferred missing lead_conversion" && exit 1)
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/assets/data/thanks-license-profiles.json" | head -3
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/denkikouji/thanks/" | head -3
          denki_thanks=$(curl -s "https://denkilp.builders-job.com/denki-lp-cvr/denkikouji/thanks/?lp=denkikouji")
          echo "$denki_thanks" | grep -q '/denki-lp-cvr/thanks-v2/' || (echo "denkikouji/thanks not redirecting to thanks-v2" && exit 1)
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/denkikouji/thanks/" | grep -qi 'location:.*builders-job.com/thanks/' && (echo "denkikouji/thanks still WP 301" && exit 1) || true
          verify_denki_lp() {
            local denki_lp app_js
            denki_lp=$(curl -s "https://denkilp.builders-job.com/denki-lp-cvr/denkikouji/")
            echo "$denki_lp" | grep -q 'app.js?v1780930000' || return 1
            app_js=$(curl -s "https://denkilp.builders-job.com/denki-lp-cvr/assets/js/app.js")
            echo "$app_js" | grep -q 'thanks-v2' || return 1
            echo "$app_js" | grep -q '09012345678' || return 1
            return 0
          }
          verified=false
          for attempt in 1 2 3 4 5 6; do
            if verify_denki_lp; then
              echo "denkikouji LP cache buster + app.js OK (attempt ${attempt})"
              verified=true
              break
            fi
            echo "denkikouji LP not propagated yet (attempt ${attempt}/6), waiting 15s..."
            sleep 15
          done
          if [ "$verified" != "true" ]; then
            echo "denkikouji still on stale app.js after retries"
            exit 1
          fi
          bash scripts/verify-wp-legacy-redirects.sh
          echo "$html" | grep -q 'thanks-page-context.js?v=24' || (echo "missing thanks-page-context v=24" && exit 1)
          echo "$html" | grep -q 'thanks-page.css?v=38' || (echo "missing thanks-page.css v=38" && exit 1)
          echo "$html" | grep -q 'thanks-booking-custom.js?v=28' || (echo "missing booking custom v=28" && exit 1)
          echo "$html" | grep -q 't-hero--compact' || (echo "missing compact hero" && exit 1)
          echo "$html" | grep -q 't-hero__stats' || (echo "missing hero stats grid" && exit 1)
          echo "$html" | grep -q 't-hero__route' || (echo "missing hero route line" && exit 1)
          echo "$html" | grep -q 't-hero__reassure' || (echo "missing hero reassure line" && exit 1)
          echo "$html" | grep -q '登録だけで終わってOK' || (echo "missing emotional hero headline" && exit 1)
          echo "$html" | grep -q 'まず下の' || (echo "missing jobs-first hero route" && exit 1)
          echo "$html" | grep -q 't-jobs--first' || (echo "missing jobs-first section" && exit 1)
          echo "$html" | grep -q '1回だけ' || (echo "missing outbound call reassurance" && exit 1)
          echo "$html" | grep -q 'thanks-license-profile.js?v=2' || (echo "missing thanks-license-profile v=2" && exit 1)
          echo "$html" | grep -q 'thanks-v2-shared.js?v=2' || (echo "missing thanks-v2-shared v=2" && exit 1)
          echo "$html" | grep -q 'thanks-booking-bootstrap.js?v=16' || (echo "missing booking bootstrap v=16" && exit 1)
          echo "$html" | grep -q '10分だけ話を聞く' || (echo "missing unified booking CTA" && exit 1)
          echo "$html" | grep -q 'id="t-future"' || (echo "missing t-future section" && exit 1)
          echo "$html" | grep -q 'data-story-id' || (echo "missing testimonial stories" && exit 1)
          echo "$html" | grep -q '非公開求人の全文' || (echo "missing thanks copy" && exit 1)
          echo "$html" | grep -q 'thanks-job-previews.json" as="fetch"' && (echo "job previews preload should be removed" && exit 1) || true
          curl -sI "https://denkilp.builders-job.com/denki-lp-cvr/assets/data/thanks-testimonial-stories.json" | head -3
          stories=$(curl -s "https://denkilp.builders-job.com/denki-lp-cvr/assets/data/thanks-testimonial-stories.json")
          echo "$stories" | grep -q '"kt"' || (echo "missing stories json kt" && exit 1)
          slots=$(curl -s "https://denkilp.builders-job.com/denki-lp-cvr/assets/data/booking-slots.json")
          echo "$slots" | grep -qE '"staff_count"[[:space:]]*:[[:space:]]*4' || (echo "booking staff_count not 4" && exit 1)
